name: Build and Upload to App Store Connect

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Resolve dependencies
      run: |
        cd StudyBuddy.swiftpm
        xcodebuild -resolvePackageDependencies \
          -scheme StudyBuddy \
          -clonedSourcePackagesDirPath ../SPMCache

    - name: Build Archive
      run: |
        cd StudyBuddy.swiftpm
        xcodebuild archive \
          -scheme StudyBuddy \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/StudyBuddy.xcarchive \
          -clonedSourcePackagesDirPath ../SPMCache \
          CODE_SIGN_IDENTITY="-" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM=ZT7BLN8CZ5

    - name: Create ExportOptions.plist
      run: |
        cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>ZT7BLN8CZ5</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
        </dict>
        </plist>
        EOF

    - name: Export and Upload to App Store Connect
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_API_KEY }}
      run: |
        # Create API key file
        mkdir -p ~/.private_keys
        echo "$APP_STORE_CONNECT_API_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
        
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/StudyBuddy.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -exportPath $RUNNER_TEMP/export \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8 \
          -authenticationKeyID $APP_STORE_CONNECT_API_KEY_ID \
          -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID
